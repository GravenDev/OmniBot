name: Node.js CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false
      - name: Read Node version from mise.toml
        id: node-version
        run: echo "version=$(grep '^node = ' mise.toml | sed 's/node = \"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: "pnpm"
      - name: Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Check code format
        run: pnpm exec oxfmt --check .
      - name: Run linter
        run: pnpm exec oxlint --deny-warnings
      - name: Run tests
        run: pnpm test
